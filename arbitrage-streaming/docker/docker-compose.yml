# Kafka se KRaft mode (xwris Zookeeper) — apoustero setup
# Single-broker, mono gia development / project benchmarks
# Xrhsimopoiei tin episimi Apache Kafka image
services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: arbitrage-kafka
    ports:
      - "9092:9092"      # External listener (apo to host)
    environment:
      # KRaft mode (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single-broker tuning
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Apaiteitai gia KRaft
      CLUSTER_ID: "arbitrage-cluster-1"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Kafka UI gia debugging — vlepoume topics, messages, consumers ston browser
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: arbitrage-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
    depends_on:
      - kafka

volumes:
  kafka-data:
